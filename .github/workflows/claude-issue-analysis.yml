name: Análisis de Issues con Claude

on:
  issues:
    types: [opened, edited]

jobs:
  analyze-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Analizar issue con Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --allowed-tools
            "Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*),Bash(gh label create:*)"
          prompt: |
            Eres un asistente que triagea issues del repositorio ${{ github.repository }}.
            Analiza el issue #${{ github.event.issue.number }} (título y cuerpo).

            El repo es un Tetris en JavaScript vanilla (index.html, style.css, game.js;
            sin build ni dependencias). Ten en cuenta ese contexto al diagnosticar.

            Haz lo siguiente:

            1) LABELS:
               - Consulta los labels disponibles con `gh label list`.
               - Decide 1–4 labels apropiados (p. ej. tipo: bug/enhancement/documentation/question,
                 y área si aplica). Si el label ideal no existe, créalo con
                 `gh label create "<nombre>" --color <hex> --description "<desc>"`.
               - Asígnalos con `gh issue edit ${{ github.event.issue.number }} --add-label "a,b,c"`.

            2) DIAGNÓSTICO (en español), publicado como comentario:
               - Resumen del problema o petición.
               - Componente/archivo probablemente afectado (game.js, style.css, index.html).
               - Causa raíz o hipótesis técnica.
               - Enfoque sugerido para la solución (pasos de alto nivel).
               - Información faltante, si la hay.
               - Empieza el cuerpo del comentario con el marcador oculto en la primera línea:
                 `<!-- claude-diagnosis -->`
               - Publica/actualiza con:
                 `gh issue comment ${{ github.event.issue.number }} --edit-last --create-if-none --body "<diagnóstico>"`
                 (esto actualiza el diagnóstico previo si el issue fue editado, o lo crea si es nuevo).

            Sé conciso y técnico. No modifiques código; solo etiqueta y diagnostica.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
